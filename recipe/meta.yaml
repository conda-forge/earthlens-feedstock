{% set python_min = "3.11" %}
{% set name = "earthlens" %}
{% set version = "0.7.0" %}

package:
  name: {{ name|lower }}-split
  version: {{ version }}

source:
  url: https://github.com/serapeum-org/earthlens/archive/{{ version }}.tar.gz
  sha256: 38da5cd8af0c735813163debe838ff80e2fabec7ea92ce99b6b9dc1e2ff45b80

build:
  number: 0
  noarch: python

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=80
    - wheel
  run:
    - python >={{ python_min }}

outputs:
  - name: earthlens
    build:
      noarch: python
      script: $PREFIX/bin/python -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python {{ python_min }}
        - pip
        - setuptools >=80
        - wheel
      run:
        - python >={{ python_min }}
        - pyramids >=0.23.0
        - geopandas >=1.0.0
        - joblib >=1.5.0
        - loguru >=0.7.3
        - numpy >=2.0.0
        - pandas >=2.0.0
        - pydantic >=2
        - pyproj >=3.7.0
        - pyyaml >=6.0.2
        - requests >=2.28.1
        - shapely >=2.0.0
        - tqdm >=4.66.0
      run_constrained:
        - boto3 >=1.43.0
        - cdsapi >=0.7.7
        - earthengine-api >=1.7.26
        - rtree >=1.0.0
    test:
      requires:
        - python {{ python_min }}
      imports:
        - earthlens
        - earthlens.aggregate
        - earthlens.base
        - earthlens.chc

  - name: earthlens-s3
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - {{ pin_subpackage('earthlens', exact=True) }}
        - boto3 >=1.43.0
        - botocore >=1.34.0
    test:
      requires:
        - python {{ python_min }}
      imports:
        - earthlens.s3

  - name: earthlens-ecmwf
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - {{ pin_subpackage('earthlens', exact=True) }}
        - cdsapi >=0.7.7
    test:
      requires:
        - python {{ python_min }}
      imports:
        - earthlens.ecmwf

  - name: earthlens-gee
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - {{ pin_subpackage('earthlens', exact=True) }}
        - earthengine-api >=1.7.26
        - google-api-python-client >=2.0
        - google-cloud-storage >=2.0
        - rtree >=1.0.0
        - urllib3 >=1.26
    test:
      requires:
        - python {{ python_min }}
      imports:
        - earthlens.gee

  - name: earthlens-all
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - {{ pin_subpackage('earthlens', exact=True) }}
        - {{ pin_subpackage('earthlens-s3', exact=True) }}
        - {{ pin_subpackage('earthlens-ecmwf', exact=True) }}
        - {{ pin_subpackage('earthlens-gee', exact=True) }}
    test:
      requires:
        - python {{ python_min }}
      imports:
        - earthlens
        - earthlens.s3
        - earthlens.ecmwf
        - earthlens.gee

about:
  home: https://github.com/serapeum-org/earthlens
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE.md
  summary: Remote sensing package for downloading satellite and climate data
  description: |
    earthlens is a Python package for downloading satellite and climate
    data from multiple sources, including the Climate Hazards Center
    (CHIRPS / CHIRP / CHIRTS / WBGT / SPI / SPEI / CHC_CMIP6, via FTP),
    ERA5 on AWS S3, the ECMWF Climate Data Store via cdsapi, and Google
    Earth Engine. It provides a unified `EarthLens` facade that lazily
    loads each backend so the optional SDK for a backend you don't use
    never has to be installed.

    The core `earthlens` package ships only the CHC (FTP) backend's
    requirements. The optional backends are packaged as separate
    metapackages that depend on `earthlens` plus the relevant SDK:

      * `earthlens-s3` — boto3 (ERA5-on-S3 backend)
      * `earthlens-ecmwf` — cdsapi (ECMWF/CDS backend)
      * `earthlens-gee` — earthengine-api + rtree (Google Earth Engine)
      * `earthlens-all` — pulls in every optional backend
  dev_url: https://github.com/serapeum-org/earthlens
  doc_url: https://serapeum-org.github.io/earthlens/
  doc_source_url: https://github.com/serapeum-org/earthlens/main/README.md

extra:
  recipe-maintainers:
    - MAfarrag
