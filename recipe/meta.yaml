{% set python_min = "3.11" %}
{% set name = "earthlens" %}
{% set version = "0.8.0" %}

package:
  name: {{ name|lower }}-split
  version: {{ version }}

source:
  url: https://github.com/serapeum-org/earthlens/archive/{{ version }}.tar.gz
  sha256: 39e245dbf42493534ebf62c1663405f42175ba67896ad4e9a0c191bae09c3ebf

build:
  number: 0
  noarch: python

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=80
    - wheel
  run:
    - python >={{ python_min }}

outputs:
  - name: earthlens
    build:
      noarch: python
      script: $PREFIX/bin/python -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python {{ python_min }}
        - pip
        - setuptools >=80
        - wheel
      run:
        - python >={{ python_min }}
        - pyramids >=0.35.0
        # GDAL + its format drivers are bundled inside the pyramids PyPI wheel
        # (osgeo vendored in pyramids/_vendor), so they are absent from
        # earthlens' pyproject.toml. The conda-forge `pyramids` package does NOT
        # vendor GDAL, so earthlens must pull the GDAL stack explicitly here.
        - gdal >=3.10.0,<4
        - libgdal-netcdf >=3.10.0,<4
        - libgdal-hdf4 >=3.10.0,<4
        - libgdal-grib >=3.10.0,<4
        - pyogrio >=0.7
        - geopandas >=1.0.0
        - joblib >=1.5.0
        - loguru >=0.7.3
        - numpy >=2.0.0
        - pandas >=2.0.0
        - pydantic >=2
        - pyproj >=3.7.0
        - pyyaml >=6.0.2
        - requests >=2.28.1
        - shapely >=2.0.0
        - tqdm >=4.66.0
        # typer + rich are core: the `earthlens` console script (project.scripts)
        # imports earthlens.cli at module load, so pyproject.toml lists them in
        # the core dependencies (not behind an extra).
        - typer >=0.12
        - rich >=13
      run_constrained:
        - boto3 >=1.43.0
        - cdsapi >=0.7.7
        - earthengine-api >=1.7.26
        - rtree >=1.0.0
    test:
      requires:
        - python {{ python_min }}
      imports:
        - earthlens
        - earthlens.aggregate
        - earthlens.base
        - earthlens.chc
      commands:
        # the earthlens CLI shipped in 0.8.0; verifies typer/rich resolve too
        - earthlens --help

  - name: earthlens-s3
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - {{ pin_subpackage('earthlens', exact=True) }}
        - boto3 >=1.43.0
        - botocore >=1.34.0
    test:
      requires:
        - python {{ python_min }}
      imports:
        - earthlens.s3

  - name: earthlens-ecmwf
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - {{ pin_subpackage('earthlens', exact=True) }}
        - cdsapi >=0.7.7
    test:
      requires:
        - python {{ python_min }}
      imports:
        - earthlens.ecmwf

  - name: earthlens-gee
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - {{ pin_subpackage('earthlens', exact=True) }}
        - earthengine-api >=1.7.26
        - google-api-python-client >=2.0
        - google-cloud-storage >=2.0
        - rtree >=1.0.0
        - urllib3 >=1.26
    test:
      requires:
        - python {{ python_min }}
      imports:
        - earthlens.gee

  - name: earthlens-all
    build:
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
      run:
        - python >={{ python_min }}
        - {{ pin_subpackage('earthlens', exact=True) }}
        - {{ pin_subpackage('earthlens-s3', exact=True) }}
        - {{ pin_subpackage('earthlens-ecmwf', exact=True) }}
        - {{ pin_subpackage('earthlens-gee', exact=True) }}
        # Remaining optional backends from the pyproject.toml `[all]` extra. Each
        # group mirrors one optional-dependency set. `radar` shares the s3 SDK
        # (boto3/botocore), already pulled in via earthlens-s3 above, and the
        # `ghsl`/`firms`/`gdacs`/`openaq` backends need no extra SDK (HTTPS +
        # core deps), so they are already covered by the base earthlens package.
        # cmems
        - copernicusmarine >=2.0.0,<3
        # fdsn
        - obspy >=1.5.0
        # hdx
        - hdx-python-api >=6,<7
        # eumetsat
        - eumdac >=3.1
        # nwp
        - herbie-data >=2026.3
        - ecmwf-opendata >=0.3
        # sentinel-hub
        - sentinelhub >=3.11.5
        # tropycal (cartopy is required: tropycal.tracks imports cartopy)
        - tropycal >=1.4
        - cartopy >=0.22
        # overture
        - overturemaps >=1.0.0
        - duckdb >=1.0.0
        # usgs-water
        - dataretrieval >=1.1.4
        # nwm (NOAA National Water Model): earthlens[s3] (boto3/botocore already
        # via earthlens-s3 above) + pyramids[parquet] (pyarrow) for to_parquet.
        - pyarrow >=10.0.0
        #
        # Backends from `[all]` deliberately NOT bundled here because they cannot
        # be satisfied on conda-forge today:
        #   * earthdata — earthaccess requires python >=3.12, which would raise
        #                 this noarch bundle's floor above python_min (3.11).
        #   * openeo    — pyproject pins openeo >=0.47,<0.48; conda-forge jumps
        #                 from 0.46 to 0.49 (no 0.47.x), so the range is unsolvable.
        #   * stac      — requires stac-asset, not yet on conda-forge.
        #   * worldpop  — worldpoppy is not on conda-forge.
    test:
      requires:
        - python {{ python_min }}
      imports:
        - earthlens
        - earthlens.s3
        - earthlens.ecmwf
        - earthlens.gee
        - earthlens.cmems
        - earthlens.fdsn
        - earthlens.hdx
        - earthlens.eumetsat
        - earthlens.nwp
        - earthlens.radar
        - earthlens.sentinel_hub
        - earthlens.tropycal
        - earthlens.overture
        - earthlens.usgs_water
        - earthlens.nwm
about:
  home: https://github.com/serapeum-org/earthlens
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE.md
  summary: Remote sensing package for downloading satellite and climate data
  description: |
    earthlens is a Python package for downloading satellite and climate
    data from multiple sources, including the Climate Hazards Center
    (CHIRPS / CHIRP / CHIRTS / WBGT / SPI / SPEI / CHC_CMIP6, via FTP),
    ERA5 on AWS S3, the ECMWF Climate Data Store via cdsapi, and Google
    Earth Engine. It provides a unified `EarthLens` facade that lazily
    loads each backend so the optional SDK for a backend you don't use
    never has to be installed.

    The core `earthlens` package ships only the CHC (FTP) backend's
    requirements. The optional backends are packaged as separate
    metapackages that depend on `earthlens` plus the relevant SDK:

      * `earthlens-s3` — boto3 (ERA5-on-S3 backend)
      * `earthlens-ecmwf` — cdsapi (ECMWF/CDS backend)
      * `earthlens-gee` — earthengine-api + rtree (Google Earth Engine)
      * `earthlens-all` — pulls in every optional backend
  dev_url: https://github.com/serapeum-org/earthlens
  doc_url: https://serapeum-org.github.io/earthlens/
  doc_source_url: https://github.com/serapeum-org/earthlens/main/README.md

extra:
  recipe-maintainers:
    - MAfarrag
